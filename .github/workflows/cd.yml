name: CD

# Runs on merge to main: builds the project against the real Snowflake
# warehouse (prod target) and publishes the generated dbt docs site
# (data catalog + lineage graph) to GitHub Pages.
#
# Requires these repository secrets (Settings -> Secrets and variables ->
# Actions): SNOWFLAKE_ACCOUNT, SNOWFLAKE_USER, SNOWFLAKE_PASSWORD,
# SNOWFLAKE_ROLE, SNOWFLAKE_WAREHOUSE, SNOWFLAKE_DATABASE.
#
# Also requires GitHub Pages enabled for this repo with source = "GitHub
# Actions" (Settings -> Pages).
on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-publish-docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Install dbt packages (dbt_utils)
        run: uv run dbt deps

      - name: Configure dbt profile (Snowflake prod target)
        run: |
          mkdir -p ~/.dbt
          cp profiles.yml.example ~/.dbt/profiles.yml

      - name: dbt build (seed + run + test against Snowflake)
        run: uv run dbt build --target prod

      - name: Generate dbt docs (data catalog + lineage graph)
        run: uv run dbt docs generate --target prod

      - name: Upload docs site
        uses: actions/upload-pages-artifact@v3
        with:
          path: target

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
